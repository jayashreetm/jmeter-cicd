name: JMeter Test - JSONPlaceholder

on:
  push:
    branches: [ master ]

jobs:
  run-jmeter:
    runs-on: ubuntu-latest

    steps:

    - name: 1. Download the code from GitHub
      uses: actions/checkout@v4

    - name: 2. Install Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 3. Download JMeter 5.6.3
      run: |
        wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz

    - name: 4. Create results folder
      run: mkdir -p results/html-report

    - name: 5. Run JMeter test against JSONPlaceholder
      run: |
        apache-jmeter-5.6.3/bin/jmeter           -n           -t tests/JsonPlaceholderTest.jmx           -l results/result.jtl           -e -o results/html-report

    - name: 6. Save HTML report as downloadable file
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jmeter-html-report
        path: results/html-report
